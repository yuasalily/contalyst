name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go vet (e2e build tag)
        run: go vet -tags e2e ./...

  test:
    name: Unit & functional (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            race: "-race"
          - os: macos-latest
            race: "-race"
          - os: windows-latest
            race: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test ${{ matrix.race }} -run TestUnit ./...
      - name: Functional tests
        run: go test ${{ matrix.race }} -run TestFunctional ./...
      - name: Coverage (unit + functional)
        run: go test ${{ matrix.race }} -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  e2e:
    name: E2E (real Docker daemon)
    needs: lint
    runs-on: ubuntu-latest # Docker is preinstalled and running on GitHub-hosted Ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify Docker
        run: docker version
      - name: Pre-pull test image
        run: docker pull busybox:latest
      - name: E2E tests
        run: go test -tags e2e -run TestE2E -v -timeout 300s ./...

  release-dryrun:
    name: Release dry-run (snapshot binaries)
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contalyst-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: warn
