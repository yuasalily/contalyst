# GoReleaser configuration — builds cross-platform binaries and a GitHub Release.
# Validate locally with: goreleaser check
version: 2

project_name: contalyst

before:
  hooks:
    - go mod download

builds:
  - id: contalyst
    main: .
    binary: contalyst
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: contalyst
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - NOTICE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "Contalyst {{ .Tag }}"
  footer: |
    ---
    Built with GoReleaser. Verify downloads against `checksums.txt`.
